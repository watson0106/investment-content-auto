name: 投資記事 毎日自動投稿

on:
  schedule:
    # 毎日 JST 05:00 (UTC 20:00 前日)
    - cron: "0 20 * * *"
  workflow_dispatch:  # 手動実行も可能

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Chrome インストール
        uses: browser-actions/setup-chrome@v1

      - name: Xvfb インストール（仮想ディスプレイ）
        run: sudo apt-get install -y xvfb

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: Claude CLI インストール
        run: npm install -g @anthropic-ai/claude-code

      - name: Claude CLI 認証セットアップ
        run: |
          mkdir -p ~/.claude
          echo '${{ secrets.CLAUDE_CODE_CREDENTIALS }}' > ~/.claude/.credentials.json

      - name: パイプライン実行
        env:
          NOTE_EMAIL:  ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
          HEADLESS:    "false"
          DISPLAY:     ":99"
        run: |
          Xvfb :99 -screen 0 1280x900x24 &
          sleep 2
          python src/main.py

      - name: 記事履歴・データをリポジトリにコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/article_history.json data/article_performance.json data/strategy_state.json data/magazine_status.json || true
          git diff --staged --quiet || git commit -m "データ更新 [skip ci]"
          git push || true

      - name: 生成記事をアーティファクトとして保存
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-article-${{ github.run_number }}
          path: output/
          retention-days: 30
